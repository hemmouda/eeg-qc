<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDF Report — {{FILENAME}}</title>
  <style>
    *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    :root {
        --bg: #f5f6fa;
        --surface: #ffffff;
        --border: #dde0ee;
        --fg: #1a1c2e;
        --fg-mid: #4a4c6a;
        --fg-dim: #8a8cb0;
        --black-c: #1a1c2e;
        --black-bg: #ececf2;
        --black-bd: #1a1c2e;
        --radius: 8px;
        --shadow: 0 1px 4px rgba(20, 20, 60, .08);
    }

    body {
        background: var(--bg);
        color: var(--fg);
        font-family: "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.6;
    }

    .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 40px 24px 80px;
    }

    .hero {
        display: flex;
        align-items: center;
        gap: 28px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 28px 32px;
        margin-bottom: 32px;
        box-shadow: var(--shadow);
    }

    .quality-circle {
        flex-shrink: 0;
        width: 96px;
        height: 96px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: .06em;
        border: 3px solid;
        background: var(--black-bg);
        border-color: var(--black-bd);
        color: var(--black-c);
    }

    .hero-info {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .hero-info h1 {
        font-size: 22px;
        font-weight: 700;
        color: var(--fg);
        word-break: break-all;
    }

    .hero-info .generated {
        font-size: 12px;
        color: var(--fg-dim);
    }

    .section {
        margin-bottom: 36px;
    }

    .section-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .1em;
        text-transform: uppercase;
        color: var(--fg-dim);
        border-bottom: 1px solid var(--border);
        padding-bottom: 8px;
        margin-bottom: 16px;
    }

    .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 12px;
    }

    .info-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 16px;
        box-shadow: var(--shadow);
    }

    .info-card .label {
        font-size: 11px;
        color: var(--fg-dim);
        margin-bottom: 2px;
    }

    .info-card .value {
        font-size: 14px;
        font-weight: 600;
        color: var(--fg);
    }

    .justification {
        margin-top: 12px;
        font-size: 13px;
        color: var(--fg-mid);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 16px;
        box-shadow: var(--shadow);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="quality-circle">
      <span>BLACK</span>
    </div>
    <div class="hero-info">
      <h1>{{FILENAME}}</h1>
      <span class="generated">Report generated {{NOW}}</span>
    </div>
  </div>
  <div class="section">
    <div class="section-title">File Information</div>
    <div class="info-grid">
      <div class="info-card">
        <div class="label">Quality</div>
        <div class="value">BLACK</div>
      </div>
    </div>
    <div class="justification">{{JUSTIFICATION}}</div>
  </div>
</div>
</body>
</html>
